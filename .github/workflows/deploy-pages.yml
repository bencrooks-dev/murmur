name: Deploy web PWA to GitHub Pages

# Manual only: run from the Actions tab AFTER enabling Pages
# (Settings → Pages → Source: GitHub Actions) and setting the RELAY_URL variable.
# Kept manual so it never auto-fails before Pages is configured.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: murmur-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build PWA
        env:
          # Set repo Variable RELAY_URL = wss://your-relay/ws (Settings → Actions → Variables)
          VITE_RELAY_URL: ${{ vars.RELAY_URL }}
          MURMUR_BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: murmur-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
